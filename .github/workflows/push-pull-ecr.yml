name: CI/CD Pipeline

on:
  push:
    branches-ignore:
        - main
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.eu-central-1.amazonaws.com

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 1. NEXT.JS APP
      - name: Build & Push App
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/qayyim-app:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/qayyim-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. AI GRADING SERVICE
      - name: Build & Push AI Grading Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai_grading_service
          file: ./ai_grading_service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/qayyim-ai:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/qayyim-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. AI UPLOAD SERVICE
      - name: Build & Push AI Upload Service
        uses: docker/build-push-action@v5
        with:
          context: ./ai_upload_service
          file: ./ai_upload_service/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/qayyim-ai-upload:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/qayyim-ai-upload:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. WORKER
      - name: Build & Push Worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/qayyim-worker:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/qayyim-worker:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_REGION,ECR_REGISTRY
          script: |
            export AWS_ACCESS_KEY_ID=$AWS_ACCESS_KEY_ID
            export AWS_SECRET_ACCESS_KEY=$AWS_SECRET_ACCESS_KEY
            export AWS_DEFAULT_REGION=$AWS_REGION
            
            cd ~/Qayyim-master
            
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REGISTRY
            
            docker-compose -f docker-compose.prod.yml pull
            
            docker-compose -f docker-compose.prod.yml up -d --force-recreate --remove-orphans
            
            docker image prune -f

        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}

      - name: Health Check
        run: |
          sleep 15
          status_code=$(curl --write-out %{http_code} --silent --output /dev/null https://qayyim.tech)
          if [[ "$status_code" -ne 200 ]]; then
            echo "Website is down! Status: $status_code"
            exit 1
          fi
          echo "Website is LIVE and Healthy!"