services:
  ai_grading:
    image: 491991045754.dkr.ecr.eu-central-1.amazonaws.com/qayyim-ai:latest
    container_name: ai_grading_container
    restart: always
    ports:
      - "5000:5000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=5000
    env_file:           # ADD THIS
      - .env            # ADD THIS
    volumes:            # ADD THIS — ChromaDB persistence
      - chroma_data:/app/chroma_db
    networks:
      - qayyim_net

  ai_upload:
    image: 491991045754.dkr.ecr.eu-central-1.amazonaws.com/qayyim-ai-upload:latest
    container_name: ai_upload_container
    restart: always
    ports:
      - "5003:5003"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=5003
    env_file:           # ADD THIS
      - .env            # ADD THIS
    networks:
      - qayyim_net

  app:
    image: 491991045754.dkr.ecr.eu-central-1.amazonaws.com/qayyim-app:latest
    container_name: nextjs_app_qayim
    restart: always
    ports:
      - "3000:3000"
    env_file:           # ADD THIS
      - .env            # ADD THIS
    depends_on:
      ai_grading:
        condition: service_started
      ai_upload:
        condition: service_started
    networks:
      - qayyim_net

  worker:
    image: 491991045754.dkr.ecr.eu-central-1.amazonaws.com/qayyim-worker:latest
    container_name: pdf_worker_qayim
    restart: always
    env_file:           # ADD THIS
      - .env            # ADD THIS
    depends_on:
      ai_grading:
        condition: service_started
      ai_upload:
        condition: service_started
    networks:
      - qayyim_net

volumes:                # ADD THIS
  chroma_data:          # ADD THIS

networks:
  qayyim_net:
    driver: bridge