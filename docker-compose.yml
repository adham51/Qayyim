version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_db_qayim
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Jeffxddowdowdow1234}
      MYSQL_DATABASE: qayyim_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Jeffxddowdowdow1234}"]
      interval: 5s
      timeout: 5s
      retries: 20

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_qayim
    restart: always
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Jeffxddowdowdow1234}
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
        RESEND_API: ${RESEND_API}
        JWT_SECRET: ${JWT_SECRET}
        AWS_REGION: ${AWS_REGION}
        AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
        AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
        AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
        AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT}
    container_name: nextjs_app_qayim
    restart: always
    ports:
      - "9002:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
      RESEND_API: ${RESEND_API}
      JWT_SECRET: ${JWT_SECRET}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT}
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "
        echo '✅ Waiting for database...' &&
        echo '✅ Database initialized from SQL dump - tables and data ready!' &&
        echo '✅ Starting Next.js application...' &&
        node server.js
      "

volumes:
  mysql_data: